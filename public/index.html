    <script>
      (() => {
        const storageKey = "howcode:pi-gui-theme:v1";
        const managedVars = [
          "--bg",
          "--sidebar",
          "--workspace",
          "--panel",
          "--panel-2",
          "--panel-3",
          "--border",
          "--border-strong",
          "--text",
          "--muted",
          "--muted-2",
          "--accent",
          "--accent-bg-subtle",
          "--accent-bg",
          "--accent-bg-strong",
          "--accent-border",
          "--accent-contrast",
          "--surface-hover",
          "--green",
          "--danger",
          "--danger-bg",
          "--danger-border",
          "--warning",
          "--warning-bg",
          "--terminal-bg",
          "--message-user-bg",
          "--message-assistant-bg",
          "--message-tool-bg",
          "--message-code-bg",
          "--markdown-heading",
          "--markdown-link",
          "--markdown-code",
          "--markdown-code-bg",
          "--markdown-quote",
          "--shadow",
        ];

        try {
          const values = JSON.parse(window.localStorage.getItem(storageKey) || "null");
          if (!values || (values.colorScheme !== "dark" && values.colorScheme !== "light")) {
            return;
          }
          if (!managedVars.every((property) => typeof values[property] === "string")) {
            return;
          }

          const rootStyle = document.documentElement.style;
          document.documentElement.style.colorScheme = values.colorScheme;
          for (const property of managedVars) {
            rootStyle.setProperty(property, values[property]);
          }
        } catch {
          // Ignore stale or invalid cached theme state during bootstrap.
        }
      })();
    </script>

  <script>
// Pi-Mobile wrapper - auto-connect to desktop bridge
(function() {
  var DESKTOP_IP = '100.69.199.38';
  var BRIDGE_PORT = 5174;
  
  // Only run on Pi-Mobile (no port = accessed via Tailscale)
  if (window.location.port) return;
  
  function updateBridgeStatus() {
    var indicator = document.getElementById('tailscale-indicator');
    if (!indicator) return;
    
    fetch('http://' + DESKTOP_IP + ':' + BRIDGE_PORT + '/__howcode/config', { cache: 'no-store' })
      .then(function(r) {
        indicator.className = r.ok ? 'connected' : 'disconnected';
        indicator.textContent = r.ok ? '🟢 Desktop' : '🔴 Disconnected';
      })
      .catch(function() {
        indicator.className = 'disconnected';
        indicator.textContent = '🔴 Disconnected';
      });
  }
  
  // Add indicator
  document.body.insertAdjacentHTML('afterbegin', 
    '<div id="tailscale-indicator" class="disconnected">🔴 Connecting...</div>');
  
  // Try to connect to bridge
  localStorage.setItem('pi-mobile-bridge-url', 'http://' + DESKTOP_IP + ':' + BRIDGE_PORT);
  
  // Update status after page loads
  window.addEventListener('load', function() { setTimeout(updateBridgeStatus, 1000); });
  setInterval(updateBridgeStatus, 30000);
})();
</script></body>
