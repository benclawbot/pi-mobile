  <head>

    <meta name="description" content="Pi-Mobile is a mobile-first PWA wrapper for howcode with Tailscale support" />
    <title>Pi — code with agents, no pretend IDE</title>

    <style>
      /* Tailscale status indicator */
      #tailscale-indicator {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        backdrop-filter: blur(10px);
        pointer-events: none;
      }
      #tailscale-indicator.connected {
        background: rgba(80, 197, 116, 0.2);
        border: 1px solid rgba(80, 197, 116, 0.4);
        color: #50c574;
      }
      #tailscale-indicator.disconnected {
        background: rgba(255, 107, 107, 0.2);
        border: 1px solid rgba(255, 107, 107, 0.4);
        color: #ff6b6b;
      }
      #tailscale-indicator svg {
        width: 14px;
        height: 14px;
      }
      
      /* Mobile CSS */
      @media (max-width: 768px) {
        /* Hide projects sidebar entirely */
        [data-testid="sidebar-projects-section"],
        .sidebar-projects-section {
          display: none !important;
        }
        
        /* Make composer panel always visible on mobile */
        .composer-panel,
        .composer-prompt-surface,
        [class*="composer"][class*="panel"],
        [data-testid="composer-panel"] {
          opacity: 1 !important;
          pointer-events: auto !important;
          visibility: visible !important;
          position: fixed !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          z-index: 1000 !important;
        }
        
        /* Make composer input always focusable */
        .composer-textarea,
        .composer-input,
        textarea[class*="composer"],
        [class*="composer"][class*="textarea"],
        [data-testid="composer-textarea"] {
          pointer-events: auto !important;
          opacity: 1 !important;
          visibility: visible !important;
        }
        
        /* Chat timeline should be scrollable above composer */
        .thread-timeline,
        [class*="thread"][class*="timeline"],
        .thread-container {
          padding-bottom: 140px !important;
          flex: 1 !important;
          overflow-y: auto !important;
          -webkit-overflow-scrolling: touch !important;
        }
        
        /* Footer buttons should be visible */
        .workspace-footer,
        [class*="footer"][class*="workspace"] {
          opacity: 1 !important;
          visibility: visible !important;
        }
        
        /* Make model selector popover WORK on mobile */
        [data-radix-popper-content-wrapper],
        [data-radix-popper-content-wrapper] * {
          pointer-events: auto !important;
          touch-action: manipulation !important;
        }
        
        /* Ensure popover portal is visible */
        [data-radix-portal] {
          position: fixed !important;
          z-index: 10000 !important;
        }
        
        /* Fix any z-index issues with popovers */
        [role="menu"],
        [role="menu"] * {
          pointer-events: auto !important;
        }
        
        /* Model popover button styling */
        [aria-controls="composer-model-menu"],
        button:has([class*="Bot"]) {
          pointer-events: auto !important;
          touch-action: manipulation !important;
        }
        
        /* Ensure toolbar buttons are clickable */
        .toolbar-button,
        button[class*="toolbar"],
        [class*="workspace-footer"] button {
          pointer-events: auto !important;
          touch-action: manipulation !important;
          -webkit-tap-highlight-color: transparent !important;
        }
        
        /* Ensure all buttons in footer are interactive */
        .workspace-footer * {
          pointer-events: auto !important;
        }
      }
      
      /* Loading spinner */
      .bootstrap-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1a1a2e;
      }
      .bootstrap-loading::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #6c5ce7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bootstrap-loading"></div>
    </div>
    <div id="tailscale-indicator" class="connected">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
      <span>Tailscale</span>
    </div>
    <script>
      // Prevent desktop bridge checks
      Object.defineProperty(window, 'howcodeDevWebBridge', {
        get: function() { return false; },
        configurable: true
      });
      
      window.piDesktop = window.piDesktop || {
        invokeAction: function() {
          return Promise.resolve({ ok: true, result: {} });
        }
      };
      
      // Hide warning elements as they appear (MutationObserver)
      function hideWarnings() {
        var allElements = document.querySelectorAll('div, span, p, section');
        for (var i = 0; i < allElements.length; i++) {
          var el = allElements[i];
          var text = el.textContent || '';
          if (text.includes('desktop bridge') || text.includes('Project sync needs')) {
            el.style.display = 'none';
          }
        }
      }
      
      hideWarnings();
      
      var observer = new MutationObserver(function(mutations) {
        hideWarnings();
      });
      
      document.addEventListener('DOMContentLoaded', function() {
        observer.observe(document.body, { 
          childList: true, 
          subtree: true,
          attributes: false,
          characterData: false
        });
        
        setTimeout(hideWarnings, 1000);
        setTimeout(hideWarnings, 2000);
        setTimeout(hideWarnings, 3000);
      });
      
      if (window.innerWidth < 768) {
        document.documentElement.classList.add('mobile-mode');
        document.body.classList.add('mobile-mode');
      }
      
      // Debug: Log any console errors for model selector
      window.addEventListener('error', function(e) {
        console.log('Error:', e.message);
      });
    </script>
  </body>
</html>
