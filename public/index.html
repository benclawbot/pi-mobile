<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Pi — code with agents, no pretend IDE" />
    <title>Pi — code with agents</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { font-family: 'Inter', -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; }
      
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
      }
      .loading-emoji { font-size: 64px; animation: pulse 2s ease-in-out infinite; }
      .loading-title { font-size: 28px; font-weight: 600; }
      .loading-text { color: #888; font-size: 14px; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      
      .bridge-status {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10000;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(26, 26, 46, 0.95);
        border: 1px solid #333;
        border-radius: 24px;
        font-size: 13px;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .bridge-status.connected { border-color: #00b894; color: #00b894; }
      .bridge-status.connecting { border-color: #f39c12; color: #f39c12; }
      .bridge-status.disconnected { border-color: #e74c3c; color: #e74c3c; }
      .bridge-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
      .bridge-status.connecting .bridge-dot { animation: blink 1s ease-in-out infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-emoji">📱</div>
        <div class="loading-title">Pi</div>
        <div class="loading-text">Loading mobile interface...</div>
      </div>
    </div>
    
    <div id="bridge-status" class="bridge-status disconnected" onclick="toggleBridge()">
      <span class="bridge-dot"></span>
      <span id="bridge-text">Connecting...</span>
    </div>
    
    <script>
      const DEFAULT_BRIDGE_URL = 'http://pcmainen.tail94f992.ts.net:5174';
      
      async function probeBridge(url) {
        try {
          const res = await fetch(url + '/__howcode/config', { cache: 'no-store' });
          if (res.ok) {
            const data = await res.json();
            return { ok: true, token: data.bridgeToken };
          }
        } catch {}
        return { ok: false };
      }
      
      async function updateBridgeStatus() {
        const status = document.getElementById('bridge-status');
        const text = document.getElementById('bridge-text');
        
        let url = localStorage.getItem('pi-mobile-bridge-url');
        if (!url) url = DEFAULT_BRIDGE_URL;
        
        status.className = 'bridge-status connecting';
        text.textContent = 'Connecting...';
        
        const result = await probeBridge(url);
        
        if (result.ok && result.token) {
          if (!localStorage.getItem('pi-mobile-bridge-token')) {
            localStorage.setItem('pi-mobile-bridge-url', url);
            localStorage.setItem('pi-mobile-bridge-token', result.token);
          }
          status.className = 'bridge-status connected';
          text.textContent = 'Desktop Connected';
        } else {
          status.className = 'bridge-status disconnected';
          text.textContent = 'Desktop Offline';
        }
      }
      
      async function toggleBridge() {
        const url = prompt('Enter bridge URL:', localStorage.getItem('pi-mobile-bridge-url') || DEFAULT_BRIDGE_URL);
        if (url) {
          localStorage.removeItem('pi-mobile-bridge-token');
          localStorage.setItem('pi-mobile-bridge-url', url);
          await updateBridgeStatus();
        }
      }
      
      updateBridgeStatus();
      setInterval(updateBridgeStatus, 30000);
    </script>
    
    <!-- Remote bridge shim - replaces window.piDesktop when using Tailscale -->
    <script>
      // Only activate if no local piDesktop exists
      if (!window.piDesktop && localStorage.getItem('pi-mobile-bridge-token')) {
        const remoteUrl = localStorage.getItem('pi-mobile-bridge-url');
        const remoteToken = localStorage.getItem('pi-mobile-bridge-token');
        
        window.piDesktop = {
          invokeAction: async (action, payload) => {
            const res = await fetch(remoteUrl + '/__howcode/request/invokeAction', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-howcode-dev-web-bridge-token': remoteToken
              },
              body: JSON.stringify({ action, payload })
            });
            if (!res.ok) throw new Error('Bridge request failed');
            return res.json();
          },
          subscribe: (callback) => {
            const es = new EventSource(remoteUrl + '/__howcode/events/desktopEvent');
            es.onmessage = (e) => callback(JSON.parse(e.data).event);
            return () => es.close();
          },
          watchSession: async (path) => {
            await fetch(remoteUrl + '/__howcode/request/watchSession', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-howcode-dev-web-bridge-token': remoteToken
              },
              body: JSON.stringify({ sessionPath: path })
            });
          }
        };
      }
    </script>
    
    <!-- Load howcode app with updated hash -->
    <script type="module" src="/assets/index-C0EnAqM4.js"></script>
  </body>
</html>
